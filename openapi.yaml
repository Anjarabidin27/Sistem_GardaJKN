openapi: 3.0.0
info:
  title: Sistem Garda JKN API
  version: 1.0.0
  description: "Dokumentasi API Sistem untuk Member dan Admin."
servers:
  - url: http://localhost/api
    description: Local Server

paths:
  /member/login:
    post:
      summary: Login Member
      tags: [Member Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nik: { type: string, example: "3171010101900000" }
                password: { type: string, example: "password" }
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /member/profile:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get Profile
      tags: [Member]
      responses:
        200: { description: OK }
    put:
      security: [{ bearerAuth: [] }]
      summary: Update Profile
      tags: [Member]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberProfile'
      responses:
        200: { description: Updated }

  /admin/login:
    post:
      summary: Login Admin
      tags: [Admin Auth]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string, example: "admin" }
                password: { type: string, example: "password" }
      responses:
        200: { description: OK }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data:
          type: object
          properties:
            token: { type: string }
            user: { type: object }

    MemberProfile:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        gender: { type: string, enum: [L, P] }
        education: { type: string }
        occupation: { type: string }
        address_detail: { type: string }
        province_id: { type: integer }
        city_id: { type: integer }
        district_id: { type: integer }
